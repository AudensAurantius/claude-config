# claude-egress/.gnupg/gpg-agent.conf — installed by
# provision-claude-egress.sh (ClaudeConfig-bd5).
#
# The broker's GPG key is passphrase-protected; the broker itself runs
# under systemd with no TTY, no pinentry path, and no access to the
# operator's pass store. The coordinator-side primer
# (prime-egress-broker.sh) supplies the passphrase out-of-band via
# gpg-preset-passphrase, and the agent keeps it cached for the
# lifetime of the broker.
#
# Cache lifetime is effectively "forever" (~1y): the agent's cache is
# erased on every gpg-agent restart, which the operator performs
# deliberately by re-running the primer. A short TTL would force the
# operator to re-prime on a schedule that has nothing to do with
# operational state.

allow-preset-passphrase
default-cache-ttl 31536000
max-cache-ttl 31536000
